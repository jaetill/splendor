name: claude-dep-watcher
# Thin caller (ADR-0018 / ADR-0045) - dep-watch lives in the platform reusable:
# jaetill/agentic-dev-environment/.github/workflows/dep-watch.yml
# The reusable runs the LLM agent read-only and publishes the rolling report
# via a separate deterministic job (writer != publisher).

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write # ceiling for the reusable's publish job; generate job downgrades to read
  id-token: write # claude-code-action OIDC in the generate job
  # issues: write intentionally absent — ADR-0045 retired the rolling dep-watch tracking
  # issue; the reusable now publishes docs/dependency-report.md to reports/dep-watch branch
  # via a deterministic push job. No issue CRUD in this workflow.

jobs:
  dep-watch:
    uses: jaetill/agentic-dev-environment/.github/workflows/dep-watch.yml@main
    secrets: inherit
