name: claude-dep-watcher
# Invokes the dep-watcher subagent (.claude/agents/dep-watcher.md) to scan
# package.json + lambda/package.json for outdated or vulnerable deps, then
# files findings as a single tracked GitHub issue (one issue per run,
# updated rather than duplicated).
#
# Schedule: weekly on Monday 09:00 UTC. Manual trigger via workflow_dispatch.

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  contents: write
  id-token: write

jobs:
  dep-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run dep-watcher agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            Act as the dep-watcher subagent defined in .claude/agents/dep-watcher.md.

            Steps:
            1. Run `npm outdated --json` at the repo root and `npm outdated --json --prefix lambda`.
            2. Run `npm audit --json --omit=dev` at both locations.
            3. Classify each finding:
               - CRITICAL/HIGH security advisory → flag for immediate update
               - Major version bump available → note + breaking-change risk
               - Minor/patch bump available → low priority, batch in monthly sweep
            4. Write the rolling report file (ADR-0045 — digest issues are retired):
                 git config user.name "dep-watch"; git config user.email "dep-watch@users.noreply.github.com"
                 git fetch origin reports/dep-watch 2>/dev/null && git checkout reports/dep-watch || git checkout -b reports/dep-watch
                 mkdir -p docs
                 Write the FULL report to docs/dependency-report.md via a Bash heredoc (replace the whole file — rolling, latest state only).
                 git add docs/dependency-report.md
                 git commit -m "dep-watch: weekly report $(date +%Y-%m-%d)" && git push origin reports/dep-watch

            Report file must:
              - Lead with `## Dependency Watch ($(date +%Y-%m-%d))`
              - Section per package manifest in the repo
              - Group findings by severity
              - End with `No actionable findings.` if everything is current
          claude_args: |
            --model claude-sonnet-4-6
            --permission-mode bypassPermissions
            --allowed-tools Bash,Read,Glob,Grep
            --append-system-prompt "Follow the platform standards in docs/standards/."
