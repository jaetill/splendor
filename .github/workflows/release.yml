name: release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

# Inlined release-please flow.
#
# Original referenced jaetill/agentic-dev-environment/.github/workflows/release.yml@main
# as a reusable workflow, but that platform repo is local-only (not pushed to
# GitHub), so the reference 404'd and the workflow failed at startup on every
# push for the first half of this session.
#
# Inlining preserves the same behavior: release-please reads conventional
# commits since the last tag, opens (or updates) a release PR with the
# auto-generated CHANGELOG and version bump per release-please-config.json.
# Merging that PR creates the GitHub release + tag.

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
