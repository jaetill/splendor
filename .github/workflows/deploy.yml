name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

# OIDC: assume the splendor-github-deploy role (no long-lived keys).
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-splendor
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  S3_BUCKET: jaetill-splendor
  CLOUDFRONT_DISTRIBUTION_ID: E15CORI71INNUD

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_DEPLOY_ENV: production
          VITE_RELEASE_VERSION: ${{ github.sha }}

      - name: Upload source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        with:
          version: ${{ github.sha }}
          environment: production
          sourcemaps: ./dist
          set_commits: auto
          finalize: true

      - name: Strip source maps from dist/ before publish
        if: always()
        run: |
          find dist -name '*.map' -type f -delete
          find dist -name '*.js' -type f -exec sed -i '/\/\/# sourceMappingURL=/d' {} +
          find dist -name '*.css' -type f -exec sed -i '/\/\*# sourceMappingURL=/d' {} +

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (immutable, long cache)
        # No --delete: hashed asset names make stale files harmless, and it avoids
        # ever wiping anything unexpected in the bucket.
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "callback.html"

      - name: Upload HTML entries (no-cache)
        run: |
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" --cache-control "no-cache"
          aws s3 cp dist/callback.html "s3://${S3_BUCKET}/callback.html" --cache-control "no-cache"

      - name: Invalidate CloudFront HTML
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/index.html" "/callback.html"
